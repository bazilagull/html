  <!DOCTYPE html>
<html>
    <head>
        <title>FORM WITH BUTTON</title>
        <style>
            form{
                width: 300px;
                margin: 50px auto;
                padding: 20px;
                border: 2px solid #ccc;
                border-radius: 10px;
                background-color:#f9f9f9;
            }
            input {
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border: 1px solid #aaa;
                border: 5px;
            }
            Button {
                width: 100%;
                padding: 10px;
                background-color: green;
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                cursor: pointer;

            }
            Button:hover {
                background-color: darkcyan;

            }
            </style>
            </head>
            <body>
                <form>
                    <h1>Login Form</h1>
                    <input type="text" placeholder="enter user name" required>
                    <input type="password" placeholder="enter password"required>
                    <button type="submit">Submit</button>
                </form>
            </body>
                    </html>
